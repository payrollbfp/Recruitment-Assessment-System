<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recruitment Assessment - Biodata</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Tahoma,sans-serif;
}

body{

    background:#F4F6F9;

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;

    padding:20px;

}

.container{

    width:100%;

    max-width:550px;

}

.card{

    background:#FFFFFF;

    border-radius:12px;

    padding:30px;

    box-shadow:0 12px 30px rgba(0,0,0,.08);

}

.title{

    text-align:center;

    font-size:28px;

    font-weight:bold;

    color:#1E3A8A;

}

.subtitle{

    text-align:center;

    color:#666;

    margin-top:10px;

    margin-bottom:30px;

}

.form-group{

    margin-bottom:18px;

}

label{

    display:block;

    font-weight:600;

    margin-bottom:8px;

}

input,
select{

    width:100%;

    height:48px;

    border:1px solid #D5D9E2;

    border-radius:8px;

    padding:0 15px;

    font-size:15px;

    outline:none;

}

input:focus,
select:focus{

    border-color:#2563EB;

}

button{

    width:100%;

    height:50px;

    background:#2563EB;

    color:white;

    border:none;

    border-radius:8px;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

    margin-top:10px;

}

button:hover{

    background:#1D4ED8;

}

button:disabled{

    background:#9CA3AF;

    cursor:not-allowed;

}

.message{

    margin-top:15px;

    color:#DC2626;

    text-align:center;

    min-height:22px;

}

.footer{

    margin-top:30px;

    text-align:center;

    color:#888;

    font-size:12px;

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="title">

Lengkapi Biodata

</div>

<div class="subtitle">

Silakan lengkapi data berikut sebelum memulai assessment.

</div>

<form id="candidateForm">

<div class="form-group">

<label>Nama Lengkap</label>

<input
type="text"
id="full_name"
required>

</div>

<div class="form-group">

<label>Email</label>

<input
type="email"
id="email"
required>

</div>

<div class="form-group">

<label>Jenis Kelamin</label>

<select id="gender">

<option value="">Pilih</option>

<option value="Laki-laki">Laki-laki</option>

<option value="Perempuan">Perempuan</option>

</select>

</div>

<div class="form-group">

<label>Tanggal Lahir</label>

<input
type="date"
id="birth_date">

</div>

<div class="form-group">

<label>Pendidikan Terakhir</label>

<select id="education">

<option value="">Pilih</option>

<option>SMA / SMK</option>

<option>D1</option>

<option>D2</option>

<option>D3</option>

<option>D4</option>

<option>S1</option>

<option>S2</option>

<option>S3</option>

</select>

</div>

<div class="form-group">

<label>Jurusan</label>

<input
type="text"
id="major">

</div>

<div class="form-group">

<label>Domisili</label>

<input
type="text"
id="domicile">

</div>

<div class="form-group">

<label>Posisi Dilamar</label>

<select id="position_id">

<option value="">Memuat Posisi...</option>

</select>

</div>

<button
type="submit"
id="btnSave">

SIMPAN BIODATA

</button>

<div
id="message"
class="message">

</div>

</form>

<div class="footer">

Recruitment Assessment System

</div>

</div>

</div>

<script>

const SUPABASE_URL="https://nwrbjbwjmkahjuuyizfq.supabase.co";

const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53cmJqYndqbWthaGp1dXlpemZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjM4OTIsImV4cCI6MjA5MjQ5OTg5Mn0.n67pONlkoMqZguyoTwQQFJ0VBRfPaIVuVlPGxsajaGA";

const supabaseClient=
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

let phone="";
let eventId="";

let candidateCode="";

  // ======================================
// INIT
// ======================================

document.addEventListener(
    "DOMContentLoaded",
    init
);

async function init(){

    phone=sessionStorage.getItem("phone");

    eventId=sessionStorage.getItem("event_id");

    if(!phone || !eventId){

        window.location.href="login.html";

        return;

    }

    await loadPosition();

    document
    .getElementById("candidateForm")
    .addEventListener(
        "submit",
        saveCandidate
    );

}

// ======================================
// LOAD POSITION
// ======================================

async function loadPosition(){

    const {data,error}=await supabaseClient

    .from("recruitment_event_positions")

    .select("*")

    .eq("event_id",eventId)

    .order("position_name");

    if(error){

        if(error){

    alert(JSON.stringify(error));

    console.error(error);

    return;

}

        return;

    }

    const combo=document.getElementById("position_id");

    combo.innerHTML='<option value="">Pilih Posisi</option>';

    data.forEach(item=>{

        combo.innerHTML+=`
        <option value="${item.id}">
            ${item.position_name}
        </option>`;

    });

}

// ======================================
// SAVE
// ======================================

async function saveCandidate(e){

    e.preventDefault();

    const btn=document.getElementById("btnSave");

    btn.disabled=true;

    btn.innerHTML="MENYIMPAN...";

    const payload={

        event_id:eventId,

        position_id:document.getElementById("position_id").value,

        phone:phone,

        full_name:document.getElementById("full_name").value.trim(),

        email:document.getElementById("email").value.trim(),

        gender:document.getElementById("gender").value,

        birth_date:document.getElementById("birth_date").value,

        education:document.getElementById("education").value,

        major:document.getElementById("major").value.trim(),

        domicile:document.getElementById("domicile").value.trim(),

        status:"Belum Mulai"

    };

    const {data,error}=await supabaseClient

    .from("candidates")

    .insert(payload)

    .select()

    .single();

    if(error){

        console.error(error);

        btn.disabled=false;

        btn.innerHTML="SIMPAN BIODATA";

        document.getElementById("message").innerHTML=
        error.message;

        return;

    }

    const code=
    "C-"+
    data.id
    .replace(/-/g,"")
    .substring(0,6)
    .toUpperCase();

    await supabaseClient

    .from("candidates")

    .update({

        candidate_code:code

    })

    .eq("id",data.id);

    sessionStorage.setItem(
        "candidate",
        JSON.stringify(data)
    );

    window.location.href=
    "dashboard.html";

}

</script>

</body>

</html>
