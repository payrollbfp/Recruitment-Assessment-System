<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Recruitment Assessment</title>

    <link rel="stylesheet"
          href="../css/global.css">

    <link rel="stylesheet"
          href="../css/candidate_login.css">

</head>

<body>

<div class="container">

    <div class="login-card">

        <div class="logo">

            <img src="../assets/logo.png"
                 id="companyLogo"
                 alt="Logo">

        </div>

        <h1 id="companyName">
            Recruitment Assessment
        </h1>

        <p class="event-name"
           id="eventName">
            Memuat Event...
        </p>

        <p class="event-period"
           id="eventPeriod">
        </p>

        <form id="loginForm">

            <div class="form-group">

                <label>
                    Nomor HP
                </label>

                <input
                    type="text"
                    id="phone"
                    placeholder="Contoh : 081234567890"
                    autocomplete="off">

            </div>

            <button
                type="submit"
                id="btnLogin">

                LANJUT

            </button>

        </form>

        <div
            id="message"
            class="message">

        </div>

        <div class="footer">

            Dengan melanjutkan Anda menyetujui
            proses assessment perusahaan.

        </div>

    </div>

</div>

<script src="../lib/supabase.min.js"></script>

<script src="../js/config.js"></script>

<script src="../js/candidate_login.js"></script>

</body>

</html>
