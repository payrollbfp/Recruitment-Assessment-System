<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DISC Personality Test</title>

  <style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Tahoma,sans-serif;

}

body{

background:#F3F6FB;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

padding:20px;

}

.container{

width:100%;
max-width:600px;

}

.card{

background:#FFFFFF;

padding:35px;

border-radius:14px;

box-shadow:0 12px 30px rgba(0,0,0,.08);

}

h1{

text-align:center;

color:#1E3A8A;

margin-bottom:10px;

}

.welcome{

text-align:center;

color:#666;

margin-bottom:30px;

}

.info{

display:flex;

justify-content:space-between;

margin-bottom:30px;

padding:15px;

background:#F8FAFC;

border-radius:10px;

text-align:center;

}

h3{

margin-bottom:15px;

}

ul{

padding-left:20px;

margin-bottom:30px;

line-height:28px;

}

button{

width:100%;

height:52px;

background:#2563EB;

color:white;

border:none;

border-radius:8px;

font-size:17px;

font-weight:bold;

cursor:pointer;

}

button:hover{

background:#1D4ED8;

}

</style>
</head>

<body>
<div class="container">

    <div class="card">

        <h1>DISC Personality Test</h1>

        <p class="welcome">
            Selamat Datang
        </p>

        <div class="info">

            <div>
                <b>Durasi</b><br>
                ± 15 Menit
            </div>

            <div>
                <b>Jumlah Soal</b><br>
                24 Soal
            </div>

        </div>

        <h3>Petunjuk</h3>

        <ul>

            <li>Jawab dengan jujur.</li>

            <li>Tidak ada jawaban benar atau salah.</li>

            <li>Pilih yang paling menggambarkan diri Anda.</li>

            <li>Kerjakan sampai selesai.</li>

        </ul>

        <button id="btnStart">

            MULAI DISC

        </button>

    </div>

</div>
</body>

</html>
