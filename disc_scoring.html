//====================================

const {data,error}=await supabaseClient

.from("candidates")

.select("*")

.eq("id",APP.candidateId)

.single();

.from("disc_answers")

//====================================
// CALCULATE DISC
//====================================

function countValue(arr,val){
    return arr.filter(x=>x===val).length;
}

function calculateDISC(){

    log("✔ Memulai DISC Engine");

    const convert={
        A:1,
        B:2,
        C:3,
        D:4
    };

    APP.mostArray=[];
    APP.leastArray=[];

    for(const item of APP.answers){

        const map=DISC_MAP[item.question_no];

        const most=
            map.P[
                convert[item.most_answer]
            ];

        const least=
            map.K[
                convert[item.least_answer]
            ];

        APP.mostArray.push(most);
        APP.leastArray.push(least);

        log(
            "Soal "+
            item.question_no+
            " → Most : "+
            most+
            " | Least : "+
            least
        );

    }

    APP.result={

        most_d:countValue(APP.mostArray,"D"),
        most_i:countValue(APP.mostArray,"I"),
        most_s:countValue(APP.mostArray,"S"),
        most_c:countValue(APP.mostArray,"C"),

        least_d:countValue(APP.leastArray,"D"),
        least_i:countValue(APP.leastArray,"I"),
        least_s:countValue(APP.leastArray,"S"),
        least_c:countValue(APP.leastArray,"C")

    };

    APP.result.most_star=
        24-
        (
            APP.result.most_d+
            APP.result.most_i+
            APP.result.most_s+
            APP.result.most_c
        );

    APP.result.least_star=
        24-
        (
            APP.result.least_d+
            APP.result.least_i+
            APP.result.least_s+
            APP.result.least_c
        );

    APP.result.change_d=
        APP.result.most_d-
        APP.result.least_d;

    APP.result.change_i=
        APP.result.most_i-
        APP.result.least_i;

    APP.result.change_s=
        APP.result.most_s-
        APP.result.least_s;

    APP.result.change_c=
        APP.result.most_c-
        APP.result.least_c;

    console.table(APP.result);

    log("<span class='ok'>✔ Perhitungan Most / Least selesai</span>");

}
