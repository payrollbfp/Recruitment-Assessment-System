<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DISC Personality Test</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Tahoma,sans-serif;
}

body{

background:#F3F6FB;

padding:25px;

}

.container{

max-width:900px;

margin:auto;

}

.card{

background:white;

border-radius:14px;

overflow:hidden;

box-shadow:0 12px 30px rgba(0,0,0,.08);

}

.header{

background:#1E3A8A;

color:white;

padding:25px;

}

.header h2{

font-size:30px;

margin-bottom:15px;

}

.topbar{

display:flex;

justify-content:space-between;

align-items:center;

}

#progressText{

font-size:17px;

}

#timer{

font-size:24px;

font-weight:bold;

}

.progressbar{

margin-top:18px;

height:8px;

background:#C7D5FF;

border-radius:30px;

overflow:hidden;

}

#progressFill{

height:100%;

width:0%;

background:#22C55E;

transition:.3s;

}

.loading{

padding:45px;

text-align:center;

font-size:18px;

color:#666;

}

table{

width:100%;

border-collapse:collapse;

display:none;

}

thead{

background:#2446A8;

color:white;

}

th{

padding:15px;

font-size:16px;

}

td{

padding:18px;

border-bottom:1px solid #ECECEC;

}

td:nth-child(1){

width:70px;

text-align:center;

font-weight:bold;

}

td:nth-child(3),

td:nth-child(4){

width:70px;

text-align:center;

}

input[type=radio]{

width:22px;

height:22px;

cursor:pointer;

}

.navigation{

display:flex;

justify-content:space-between;

padding:25px;

}

button{

height:50px;

padding:0 35px;

border:none;

border-radius:8px;

background:#2563EB;

color:white;

font-size:16px;

font-weight:bold;

cursor:pointer;

}

button:hover{

background:#1D4ED8;

}

button:disabled{

background:#AAB6CF;

cursor:not-allowed;

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="header">

<h2>

DISC Personality Test

</h2>

<div class="topbar">

<div id="progressText">

Memuat...

</div>

<div id="timer">

00:00

</div>

</div>

<div class="progressbar">

<div id="progressFill"></div>

</div>

</div>

<div id="loading" class="loading">

Mengambil soal dari server...

</div>

<table id="questionTable">

<thead>

<tr>

<th>No</th>

<th>Gambaran Diri</th>

<th>P</th>

<th>K</th>

</tr>

</thead>

<tbody id="questionBody">

</tbody>

</table>

<div class="navigation">

<button id="btnPrev">

◀ Sebelumnya

</button>

<button id="btnNext">

Berikutnya ▶

</button>

</div>

</div>

</div>

 <script>

 //==========================================
// SUPABASE
//==========================================

const SUPABASE_URL="https://nwrbjbwjmkahjuuyizfq.supabase.co";

const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53cmJqYndqbWthaGp1dXlpemZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjM4OTIsImV4cCI6MjA5MjQ5OTg5Mn0.n67pONlkoMqZguyoTwQQFJ0VBRfPaIVuVlPGxsajaGA";

const supabaseClient=supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

//==========================================
// APP
//==========================================

const APP={

candidateId:null,

candidate:null,

assessment:null,

questions:[],

answers:{},

currentQuestion:1,

totalQuestion:0,

remainingSeconds:0,

timer:null

};  

 //==========================================
// START
//==========================================

document.addEventListener(
"DOMContentLoaded",
init
);

async function init(){

const params=new URLSearchParams(
window.location.search
);

APP.candidateId=params.get("id");

if(!APP.candidateId){

alert("Candidate tidak ditemukan");

window.location.href="login.html";

return;

}

await loadCandidate();

await loadAssessment();

restoreCurrentQuestion();

startTimer();

showQuestion();

await loadQuestions();

await loadAnswers();

console.log(APP);

}

//==========================================
// LOAD CANDIDATE
//==========================================

async function loadCandidate(){

const {data,error}=await supabaseClient

.from("candidates")

.select("*")

.eq("id",APP.candidateId)

.single();

if(error){

alert(error.message);

return;

}

APP.candidate=data;

}

  //==========================================
// LOAD ASSESSMENT
//==========================================

async function loadAssessment(){

const {data,error}=await supabaseClient

.from("assessment_tests")

.select("*")

.eq("test_code","DISC")

.single();

if(error){

alert(error.message);

return;

}

APP.assessment=data;

APP.remainingSeconds=

data.duration_minutes*60;

}

//==========================================
// TIMER
//==========================================

function startTimer(){

updateTimer();

APP.timer=setInterval(()=>{

APP.remainingSeconds--;

updateTimer();

if(APP.remainingSeconds<=0){

clearInterval(APP.timer);

alert("Waktu habis.");

}

},1000);

}

function updateTimer(){

const m=Math.floor(APP.remainingSeconds/60);

const s=APP.remainingSeconds%60;

document.getElementById("timer").innerHTML=

String(m).padStart(2,"0")

+":"

+

String(s).padStart(2,"0");

}

 //==========================================
// SHOW QUESTION
//==========================================

function showQuestion(){

const q=APP.questions.find(

x=>x.question_no===APP.currentQuestion

);

if(!q)return;

document.getElementById("loading").style.display="none";

document.getElementById("questionTable").style.display="table";

document.getElementById("progressText").innerHTML=

"Soal "

+

APP.currentQuestion

+

" dari "

+

APP.totalQuestion;

document.getElementById("progressFill").style.width=

(APP.currentQuestion/APP.totalQuestion*100)

+

"%";

document.getElementById("questionBody").innerHTML=`

<tr>

<td rowspan="4">${q.question_no}</td>

<td>${q.option_a}</td>

<td><input type="radio" name="most" value="A"></td>

<td><input type="radio" name="least" value="A"></td>

</tr>

<tr>

<td>${q.option_b}</td>

<td><input type="radio" name="most" value="B"></td>

<td><input type="radio" name="least" value="B"></td>

</tr>

<tr>

<td>${q.option_c}</td>

<td><input type="radio" name="most" value="C"></td>

<td><input type="radio" name="least" value="C"></td>

</tr>

<tr>

<td>${q.option_d}</td>

<td><input type="radio" name="most" value="D"></td>

<td><input type="radio" name="least" value="D"></td>

</tr>

`;

restoreAnswer();

}

//==========================================
// RESTORE ANSWER
//==========================================

function restoreAnswer(){

const old=

APP.answers[APP.currentQuestion];

if(!old)return;

document.querySelector(

`input[name="most"][value="${old.most_answer}"]`

).checked=true;

document.querySelector(

`input[name="least"][value="${old.least_answer}"]`

).checked=true;

}

//==========================================
// LOAD QUESTIONS
//==========================================

async function loadQuestions(){

const {data,error}=await supabaseClient

.from("disc_questions")

.select("*")

.eq("active",true)

.order("question_no");

if(error){

alert(error.message);

return;

}

APP.questions=data;

APP.totalQuestion=data.length;

}

//==========================================
// LOAD ANSWERS
//==========================================

async function loadAnswers(){

const {data,error}=await supabaseClient

.from("disc_answers")

.select("*")

.eq("candidate_id",APP.candidateId);

if(error){

alert(error.message);

return;

}

APP.answers={};

data.forEach(item=>{

APP.answers[item.question_no]=item;

});

}

//==========================================
// RESTORE CURRENT QUESTION
//==========================================

function restoreCurrentQuestion(){

const totalAnswered=

Object.keys(APP.answers).length;

if(totalAnswered>0){

APP.currentQuestion=totalAnswered+1;

}

if(APP.currentQuestion>APP.totalQuestion){

APP.currentQuestion=APP.totalQuestion;

}

}

</script>
 </body>

</html>
