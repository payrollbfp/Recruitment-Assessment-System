<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Tahoma,sans-serif;
}

body{

background:#F3F6FB;
padding:20px;

}

.container{

max-width:900px;
margin:auto;

}

.card{

background:#fff;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
overflow:hidden;

}

.header{

background:#1E3A8A;
color:white;
padding:20px;

}

.header h2{

font-size:28px;

}

.topbar{

display:flex;
justify-content:space-between;
align-items:center;
margin-top:15px;

}

.progress{

font-size:16px;

}

.timer{

font-size:22px;
font-weight:bold;

}

.progressbar{

margin-top:15px;
height:8px;
background:#BFD0FF;
border-radius:10px;

}

.progressfill{

height:100%;
width:0%;
background:#22C55E;
border-radius:10px;

transition:.3s;

}

.table{

width:100%;
border-collapse:collapse;

}

.table thead{

background:#2446A8;
color:white;

}

.table th{

padding:14px;

font-size:16px;

}

.table td{

padding:18px;
border-bottom:1px solid #E5E7EB;

}

.table td:nth-child(1){

width:70px;
text-align:center;
font-weight:bold;

}

.table td:nth-child(3),
.table td:nth-child(4){

width:70px;
text-align:center;

}

input[type=radio]{

width:22px;
height:22px;
cursor:pointer;

}

.navigation{

display:flex;
justify-content:space-between;
padding:25px;

}

button{

height:50px;
padding:0 35px;

border:none;
border-radius:8px;

background:#2563EB;

color:white;

font-size:16px;

font-weight:bold;

cursor:pointer;

}

button:hover{

background:#1D4ED8;

}

button:disabled{

background:#94A3B8;
cursor:not-allowed;

}

.loading{

padding:40px;
text-align:center;
font-size:18px;
color:#666;

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="header">

<h2>

DISC Personality Test

</h2>

<div class="topbar">

<div
id="progressText"
class="progress">

Memuat...

</div>

<div
id="timer"
class="timer">

00:00

</div>

</div>

<div class="progressbar">

<div
id="progressFill"
class="progressfill">

</div>

</div>

</div>

<div
id="loading"
class="loading">

Mengambil Soal...

</div>

<table
id="questionTable"
class="table"
style="display:none;">

<thead>

<tr>

<th>No</th>

<th>Gambaran Diri</th>

<th>P</th>

</tr>

</thead>

id="questionBody">

</tbody>

</table>

<div class="navigation">

<button id="btnPrev">

◀ Sebelumnya

</button>

<button id="btnNext">

Berikutnya ▶

</button>

<button id="btnDebug">

TEST INPUT

</button>

</div>

</div>

</div>

<script>

//===================================
// SUPABASE
//===================================

const SUPABASE_URL="https://nwrbjbwjmkahjuuyizfq.supabase.co";

const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53cmJqYndqbWthaGp1dXlpemZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjM4OTIsImV4cCI6MjA5MjQ5OTg5Mn0.n67pONlkoMqZguyoTwQQFJ0VBRfPaIVuVlPGxsajaGA";

const supabaseClient=
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

//===================================
// GLOBAL
//===================================

let candidateId=null;

let candidate=null;

let assessment=null;

let questions=[];

let currentQuestion=1;

let totalQuestion=0;

let startQuestionTime=Date.now();

let answers={};

let remainingSeconds=0;

let timerInterval=null;

//===================================
// URL PARAMETER
//===================================

const params=new URLSearchParams(window.location.search);

candidateId=params.get("id");

//===================================
// START
//===================================

document.addEventListener(
"DOMContentLoaded",
init
);

async function init(){

    if(!candidateId){

        alert("Candidate tidak ditemukan.");

        window.location.href="login.html";

        return;

    }

await loadCandidate();

await loadAssessment();

remainingSeconds=assessment.duration_minutes*60;

startTimer();

    
await loadQuestions();

await loadAnswers();

if(Object.keys(answers).length>0){

currentQuestion=

Object.keys(answers).length+1;

}
  
showQuestion();

}

//===================================
// LOAD CANDIDATE
//===================================

async function loadCandidate(){

    const {data,error}=await supabaseClient

    .from("candidates")

    .select("*")

    .eq("id",candidateId)

    .single();

    if(error){

        console.error(error);

        alert(error.message);

        return;

    }

    candidate=data;

    console.log("Candidate :",candidate);

}

function startTimer(){

    clearInterval(timerInterval);

    timerInterval=setInterval(()=>{

        remainingSeconds--;

        const m=Math.floor(remainingSeconds/60);

        const s=remainingSeconds%60;

        document.getElementById("timer").innerHTML=

        String(m).padStart(2,"0")

        +":"

        +String(s).padStart(2,"0");

        if(remainingSeconds<=0){

            clearInterval(timerInterval);

            finishDISC();

        }

    },1000);

}

window.onbeforeunload=function(){

return "Assessment sedang berlangsung.";

}
//===================================
// LOAD ASSESSMENT
//===================================

async function loadAssessment(){

    const {data,error}=await supabaseClient

    .from("assessment_tests")

    .select("*")

    .eq("test_code","DISC")

    .single();

    if(error){

        console.error(error);

        alert(error.message);

        return;

    }

    assessment=data;

    console.log("Assessment :",assessment);

}


//===================================
// LOAD QUESTIONS
//===================================

async function loadQuestions(){

    const {data,error}=await supabaseClient

    .from("disc_questions")

    .select("*")

    .eq("active",true)

    .order("question_no");

    if(error){

        console.error(error);

        alert(error.message);

        return;

    }

    questions=data;

    totalQuestion=questions.length;

    console.log("Questions :",questions);

}

btn.disabled=false;

//===================================
// SHOW QUESTION
//===================================

function showQuestion(){

    const q=questions.find(
        x=>x.question_no===currentQuestion
    );

    if(!q)return;

    document.getElementById("loading").style.display="none";

    document.getElementById("questionTable").style.display="table";

    document.getElementById("progressText").innerHTML =
"Soal " + currentQuestion + " dari " + totalQuestion;

document.getElementById("progressFill").style.width =
((currentQuestion / totalQuestion) * 100) + "%";
 document.getElementById("questionBody").innerHTML=`
    
const old = answers[currentQuestion];

if(old){

    document.querySelector(
        `input[name="most"][value="${old.most_answer}"]`
    ).checked=true;

    document.querySelector(
        `input[name="least"][value="${old.least_answer}"]`
    ).checked=true;

}
    ((currentQuestion/totalQuestion)*100)+"%";

    

<tr>

<td rowspan="4">${q.question_no}</td>

<td>${q.option_a}</td>

<td><input type="radio" name="most" value="A"></td>

<td><input type="radio" name="least" value="A"></td>

</tr>

<tr>

<td>${q.option_b}</td>

<td><input type="radio" name="most" value="B"></td>

<td><input type="radio" name="least" value="B"></td>

</tr>

<tr>

<td>${q.option_c}</td>

<td><input type="radio" name="most" value="C"></td>

<td><input type="radio" name="least" value="C"></td>

</tr>

<tr>

<td>${q.option_d}</td>

<td><input type="radio" name="most" value="D"></td>

<td><input type="radio" name="least" value="D"></td>

</tr>

`;

}

//===================================
// BUTTON EVENT
//===================================

document
.getElementById("btnNext")
.addEventListener(
"click",
nextQuestion
);

document
.getElementById("btnPrev")
.addEventListener(
"click",
prevQuestion
);

document
.getElementById("btnDebug")
.addEventListener(
"click",
buildInput
);

//===================================
// VALIDASI
//===================================

function getAnswer(){

    const most=document.querySelector(
    'input[name="most"]:checked'
    );

    const least=document.querySelector(
    'input[name="least"]:checked'
    );

    if(!most || !least){

        alert("Silakan pilih P dan K.");

        return null;

    }

    if(most.value===least.value){

        alert("P dan K tidak boleh sama.");

        return null;

    }

    return{

        most:most.value,

        least:least.value

    };

}

//===================================
// SAVE ANSWER
//===================================

async function saveAnswer(answer){

    const duration=Math.floor(
        (Date.now()-startQuestionTime)/1000
    );

    const payload={

        candidate_id:candidateId,

        question_no:currentQuestion,

        most_answer:answer.most,

        least_answer:answer.least,

        duration_seconds:duration

    };

    const old=answers[currentQuestion];

    let error;

    if(old){

        ({error}=await supabaseClient

        .from("disc_answers")

        .update(payload)

        .eq("id",old.id));

    }

    else{

        ({error}=await supabaseClient

        .from("disc_answers")

        .insert(payload));

    }

    if(error){

        console.error(error);

        alert(error.message);

        return false;

    }

    await loadAnswers();

    return true;

}
//===================================
// NEXT
//===================================
const btn=document.getElementById("btnNext");

btn.disabled=true;
async function nextQuestion(){

    const btn=document.getElementById("btnNext");

    btn.disabled=true;

    ...

    if(currentQuestion<totalQuestion){

        currentQuestion++;

        startQuestionTime=Date.now();

        showQuestion();

    }else{

        await finishDISC();

    }

    btn.disabled=false;

}

//===================================
// PREVIOUS
//===================================

function prevQuestion(){

    if(currentQuestion==1)return;

    currentQuestion--;

    showQuestion();

}

//===================================
// LOAD ANSWERS
//===================================

async function loadAnswers(){

    const {data,error}=await supabaseClient

    .from("disc_answers")

    .select("*")

    .eq("candidate_id",candidateId);

    if(error){

        console.error(error);

        return;

    }

    answers={};

    data.forEach(item=>{

        answers[item.question_no]=item;

    });

    console.log("Answer Cache :",answers);

}

//===================================
// BUILD INPUT
//===================================

function buildInput(){

    console.clear();

    console.log("===== DISC INPUT =====");

    questions.forEach(q=>{

        const ans=answers[q.question_no];

        if(!ans)return;

        let most="";
        let least="";

        switch(ans.most_answer){

            case "A":
                most=q.option_a_most;
                break;

            case "B":
                most=q.option_b_most;
                break;

            case "C":
                most=q.option_c_most;
                break;

            case "D":
                most=q.option_d_most;
                break;

        }

        switch(ans.least_answer){

            case "A":
                least=q.option_a_least;
                break;

            case "B":
                least=q.option_b_least;
                break;

            case "C":
                least=q.option_c_least;
                break;

            case "D":
                least=q.option_d_least;
                break;

        }

        console.table({

            soal:q.question_no,

            most_answer:ans.most_answer,

            least_answer:ans.least_answer,

            most_result:most,

            least_result:least

        });

    });

}

  const selesai=

Object.keys(answers).length;

document.getElementById("progressFill").style.width=

(selesai/totalQuestion*100)+"%";

  async function finishDISC(){

    clearInterval(timerInterval);

    await supabaseClient

    .from("candidates")

    .update({

        status:"DISC Selesai"

    })

    .eq("id",candidateId);

    alert("DISC selesai.");

    window.location.href=

    "dashboard.html?id="+candidateId;

}
  


</script>

</body>
