<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DISC Personality Test</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Tahoma,sans-serif;
}

body{

background:#F3F6FB;

padding:25px;

}

.container{

max-width:900px;

margin:auto;

}

.card{

background:white;

border-radius:14px;

overflow:hidden;

box-shadow:0 12px 30px rgba(0,0,0,.08);

}

.header{

background:#1E3A8A;

color:white;

padding:25px;

}

.header h2{

font-size:30px;

margin-bottom:15px;

}

.topbar{

display:flex;

justify-content:space-between;

align-items:center;

}

#progressText{

font-size:17px;

}

#timer{

font-size:24px;

font-weight:bold;

}

.progressbar{

margin-top:18px;

height:8px;

background:#C7D5FF;

border-radius:30px;

overflow:hidden;

}

#progressFill{

height:100%;

width:0%;

background:#22C55E;

transition:.3s;

}

.loading{

padding:45px;

text-align:center;

font-size:18px;

color:#666;

}

table{

width:100%;

border-collapse:collapse;

display:none;

}

thead{

background:#2446A8;

color:white;

}

th{

padding:15px;

font-size:16px;

}

td{

padding:18px;

border-bottom:1px solid #ECECEC;

}

td:nth-child(1){

width:70px;

text-align:center;

font-weight:bold;

}

td:nth-child(3),

td:nth-child(4){

width:70px;

text-align:center;

}

input[type=radio]{

width:22px;

height:22px;

cursor:pointer;

}

.navigation{

display:flex;

justify-content:space-between;

padding:25px;

}

button{

height:50px;

padding:0 35px;

border:none;

border-radius:8px;

background:#2563EB;

color:white;

font-size:16px;

font-weight:bold;

cursor:pointer;

}

button:hover{

background:#1D4ED8;

}

button:disabled{

background:#AAB6CF;

cursor:not-allowed;

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="header">

<h2>

DISC Personality Test

</h2>

<div class="topbar">

<div id="progressText">

Memuat...

</div>

<div id="timer">

00:00

</div>

</div>

<div class="progressbar">

<div id="progressFill"></div>

</div>

</div>

<div id="loading" class="loading">

Mengambil soal dari server...

</div>

<table id="questionTable">

<thead>

<tr>

<th>No</th>

<th>Gambaran Diri</th>

<th>P</th>

<th>K</th>

</tr>

</thead>

<tbody id="questionBody">

</tbody>

</table>

<div class="navigation">

<button id="btnPrev">

◀ Sebelumnya

</button>

<button id="btnNext">

Berikutnya ▶

</button>

</div>

</div>

</div>

</body>

</html>
